name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Install Rust target
        run: |
          rustup target add aarch64-linux-android

      - name: Build
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | tail -n 1)
          echo "Using NDK path: $NDK_PATH"
          
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          
          export CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/bin/aarch64-linux-android33-clang
          
          cargo build --release --target aarch64-linux-android

      - name: Upload library
        uses: actions/upload-artifact@v5
        with:
          name: libncore
          path: target/aarch64-linux-android/release/*.so

      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: ncore
          path: |
            target/aarch64-linux-android/release/ncore
